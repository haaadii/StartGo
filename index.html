<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono Neo</title>
    <style>
        :root {
            --bg: #f0f2f5; --glass: rgba(255, 255, 255, 0.7); --text: #0f172a;
            --accent: #000; --sub: #64748b; --shadow: rgba(0,0,0,0.05);
        }
        [data-theme="dark"] {
            --bg: #000; --glass: rgba(30, 41, 59, 0.7); --text: #f8fafc;
            --accent: #fff; --sub: #94a3b8; --shadow: rgba(255,255,255,0.02);
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; min-height: 100vh; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Header & Theme */
        .top-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; padding: 30px 20px; box-sizing: border-box; }
        .theme-toggle { background: var(--glass); border: 1px solid var(--shadow); padding: 8px 15px; border-radius: 20px; cursor: pointer; color: var(--text); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* Main Card */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            width: 90%; max-width: 380px; border-radius: 40px; padding: 40px 20px;
            box-shadow: 0 20px 40px var(--shadow); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; position: relative; overflow: hidden;
        }

        #badge { font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--sub); margin-bottom: 20px; display: block; }

        /* Timer Display */
        .display { margin: 20px 0; }
        #time { font-size: 6rem; font-weight: 200; letter-spacing: -4px; line-height: 1; }
        .unit { font-size: 1.5rem; font-weight: 300; color: var(--sub); margin-left: 5px; }

        /* Settings */
        .slider-box { margin: 30px 0; padding: 0 20px; }
        input[type=range] { width: 100%; height: 4px; background: var(--sub); border-radius: 5px; appearance: none; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 3px solid var(--bg); }
        .dist-label { font-size: 0.8rem; font-weight: 500; margin-bottom: 10px; display: block; color: var(--sub); }

        /* Buttons */
        #mainBtn {
            width: 80%; padding: 20px; border-radius: 50px; border: none;
            background: var(--accent); color: var(--bg);
            font-size: 0.9rem; font-weight: 700; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s;
        }
        #mainBtn:active { transform: scale(0.95); opacity: 0.8; }

        /* Stats Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; margin: 30px 0; border-top: 1px solid var(--shadow); padding-top: 20px; }
        .stat-v { font-size: 1.2rem; font-weight: 600; display: block; }
        .stat-l { font-size: 0.6rem; font-weight: 700; color: var(--sub); text-transform: uppercase; }

        /* Remote / Hidden Tools */
        .remote { margin-top: 30px; display: flex; gap: 10px; opacity: 0.3; transition: 0.3s; }
        .remote:hover { opacity: 1; }
        .btn-s { background: none; border: 1px solid var(--sub); color: var(--text); padding: 8px 15px; border-radius: 12px; font-size: 0.6rem; cursor: pointer; }

        /* History */
        .history { width: 90%; max-width: 380px; margin-top: 40px; }
        .h-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--shadow); font-size: 0.85rem; }
        .h-time { font-weight: 700; }
        .h-speed { color: var(--sub); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-weight: 900; letter-spacing: -1px;">CHRONO<span style="color:var(--sub)">.</span></div>
        <button class="theme-toggle" onclick="toggleTheme()">Mode Night</button>
    </div>

    <div class="glass-card">
        <span id="badge">Standby</span>
        
        <div class="display">
            <span id="time">0.00</span><span class="unit">s</span>
        </div>

        <div class="grid">
            <div>
                <span class="stat-l">Vitesse max</span>
                <span id="speed" class="stat-v">0.0 <small>km/h</small></span>
            </div>
            <div>
                <span class="stat-l">Réaction</span>
                <span id="react" class="stat-v">0.00 <small>s</small></span>
            </div>
        </div>

        <div class="slider-box">
            <span class="dist-label">Distance de test : <b id="d-val">10</b>m</span>
            <input type="range" id="dist" min="5" max="100" value="10" oninput="document.getElementById('d-val').innerText=this.value">
        </div>

        <button id="mainBtn" onclick="initSession()">START</button>

        <div class="remote">
            <button class="btn-s" onclick="trigger('foot')">BOOT</button>
            <button class="btn-s" onclick="trigger('finish')">STOP</button>
        </div>
    </div>

    <div class="history" id="history"></div>

    <script>
        let state = "IDLE", start, timer, distance = 10;
        const ctx = new (window.AudioContext || window.webkitAudioContext)();

        function toggleTheme() {
            const b = document.body;
            const isDark = b.getAttribute('data-theme') === 'dark';
            b.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.querySelector('.theme-toggle').innerText = isDark ? 'Mode Night' : 'Mode Day';
        }

        function beep(f, d) {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = f; o.start(); setTimeout(() => o.stop(), d);
        }

        function initSession() {
            state = "WAIT";
            document.getElementById('badge').innerText = "Hold on...";
            document.getElementById('mainBtn').style.opacity = "0.3";
            
            setTimeout(() => {
                if(state !== "WAIT") return;
                beep(1000, 400);
                start = performance.now();
                state = "RUN";
                document.getElementById('badge').innerText = "Running";
                timer = setInterval(() => {
                    document.getElementById('time').innerText = ((performance.now()-start)/1000).toFixed(2);
                }, 40);
            }, 1500 + Math.random() * 2000);
        }

        function trigger(type) {
            if(state !== "RUN") return;
            if(type === 'foot') {
                const r = (performance.now() - start)/1000;
                document.getElementById('react').innerHTML = `${r.toFixed(2)} <small>s</small>`;
            } else {
                clearInterval(timer);
                const t = parseFloat(document.getElementById('time').innerText);
                const d = document.getElementById('dist').value;
                const v = ((d / t) * 3.6).toFixed(1);
                document.getElementById('speed').innerHTML = `${v} <small>km/h</small>`;
                addHistory(t, v);
                reset();
            }
        }

        function reset() {
            state = "IDLE";
            document.getElementById('badge').innerText = "Finished";
            document.getElementById('mainBtn').style.opacity = "1";
        }

        function addHistory(t, v) {
            const h = document.getElementById('history');
            const row = document.createElement('div');
            row.className = 'h-row';
            row.innerHTML = `<span class="h-time">${t}s</span> <span class="h-speed">${v} km/h</span>`;
            h.prepend(row);
        }
    </script>
</body>
</html>                <input type="text" id="name" placeholder="Prénom Nom">
                <select id="role"><option value="athlete">Athlète</option><option value="coach">Coach</option></select>
            </div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button onclick="authAction()">VALIDER</button>
            <p onclick="document.getElementById('signup-box').style.display='block'; this.style.display='none'" style="font-size:0.8rem; cursor:pointer; color:gray;">Nouveau ? Créer un compte</p>
        </div>
    </div>

    <div id="athlete-view">
        <div class="glass" id="link-panel" style="margin-bottom:20px;">
            <p style="text-align:center; font-weight:700;">Lier à un Coach</p>
            <input type="text" id="inv-code" placeholder="CODE" style="text-align:center; font-size:1.2rem;">
            <button class="btn-accent" onclick="linkToCoach()">ACTIVER LA LIAISON</button>
        </div>
        <div class="glass" style="text-align:center; padding:40px 0;">
            <div id="timer" style="font-size:6rem; font-weight:900;">0.00</div>
            <p style="color:gray;">secondes</p>
        </div>
        <button onclick="startRun()" id="goBtn" style="margin-top:20px; padding:25px; font-size:1.2rem;">DÉMARRER</button>
        <button onclick="forceFinish()" style="background:#e2e8f0; color:#475569; margin-top:10px;">SIMULER CAPTEUR</button>
        <button onclick="auth.signOut().then(()=>location.reload())" style="background:none; color:gray; font-size:0.8rem;">Déconnexion</button>
    </div>

    <div id="coach-view">
        <div class="sidebar">
            <h2 style="font-weight:900;">STARTGO<span style="color:var(--accent)">.</span></h2>
            <p style="font-size:0.7rem; color:#94a3b8; text-transform:uppercase; letter-spacing:1px;">Mes Athlètes</p>
            <div id="list-container"></div>
            <button onclick="auth.signOut().then(()=>location.reload())" style="margin-top:auto; background:#f1f5f9; color:#475569;">Quitter</button>
        </div>
        <div class="main">
            <div class="glass" style="margin-bottom:25px; display:flex; justify-content:space-between; align-items:center;">
                <div><h1 style="margin:0;">Dashboard</h1><p id="c-uid" style="font-size:0.6rem; color:gray;"></p></div>
                <button onclick="genPairCode()" class="btn-accent" style="width:auto;">Générer Code</button>
            </div>
            <div id="code-box" style="display:none; text-align:center; margin-bottom:20px; font-size:2rem; font-weight:900; color:var(--accent);"></div>
            
            <div id="stats-panel" class="glass" style="display:none;">
                <h2 id="active-name">Performance</h2>
                <div style="height:300px;"><canvas id="perfChart"></canvas></div>
                <div id="history-box" style="margin-top:25px; border-top:1px solid #eee; padding-top:20px;"></div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyDKvUUqhl9xIBFVuBDT35rbjkFxBxWX5ZU",
            authDomain: "startgo-project.firebaseapp.com",
            projectId: "startgo-project",
            storageBucket: "startgo-project.firebasestorage.app",
            messagingSenderId: "920233789220",
            appId: "1:920233789220:web:9f8a8d9fd3a3add39a55b1"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth(), db = firebase.firestore();
        let myChart = null, runTimer, startTime;

        // AUTH
        async function authAction() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            const isReg = document.getElementById('signup-box').style.display === 'block';
            try {
                if(isReg) {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(r.user.uid).set({
                        uid: r.user.uid, name: document.getElementById('name').value,
                        role: document.getElementById('role').value, email: e
                    });
                } else await auth.signInWithEmailAndPassword(e, p);
            } catch(err) { alert(err.message); }
        }

        auth.onAuthStateChanged(async u => {
            if(!u) return;
            document.getElementById('auth-section').style.display = 'none';
            const data = (await db.collection('users').doc(u.uid).get()).data();
            if(data.role === 'coach') {
                document.getElementById('coach-view').style.display = 'grid';
                document.getElementById('c-uid').innerText = "ID: " + u.uid;
                initCoach(u.uid);
            } else {
                document.getElementById('athlete-view').style.display = 'block';
                if(data.coachId) document.getElementById('link-panel').style.display = 'none';
            }
        });

        // ATHLÈTE
        async function linkToCoach() {
            const code = document.getElementById('inv-code').value.toUpperCase();
            const snap = await db.collection('pairing_codes').doc(code).get();
            if(snap.exists) {
                await db.collection('users').doc(auth.currentUser.uid).update({ coachId: snap.data().coachId });
                alert("Liaison réussie !"); location.reload();
            } else alert("Code erroné");
        }

        function startRun() {
            document.getElementById('goBtn').innerText = "ATTENTE...";
            setTimeout(() => {
                startTime = performance.now();
                document.getElementById('goBtn').innerText = "RUN !";
                runTimer = setInterval(() => {
                    document.getElementById('timer').innerText = ((performance.now() - startTime) / 1000).toFixed(2);
                }, 40);
            }, 2000 + Math.random() * 3000);
        }

        async function forceFinish() {
            clearInterval(runTimer);
            const u = auth.currentUser;
            const profile = (await db.collection('users').doc(u.uid).get()).data();
            if(!profile.coachId) return alert("ERREUR: Tu n'as pas de coach lié !");
            
            await db.collection('sessions').add({
                athleteId: u.uid, athleteName: profile.name, coachId: profile.coachId,
                time: document.getElementById('timer').innerText, date: firebase.firestore.Timestamp.now()
            });
            alert("Temps envoyé au coach.");
            document.getElementById('goBtn').innerText = "DÉMARRER";
        }

        // COACH
        async function genPairCode() {
            const c = Math.random().toString(36).substring(2,6).toUpperCase();
            await db.collection('pairing_codes').doc(c).set({ coachId: auth.currentUser.uid });
            const box = document.getElementById('code-box');
            box.innerText = "CODE: " + c; box.style.display = 'block';
        }

        function initCoach(id) {
            db.collection('users').where('coachId', '==', id).onSnapshot(s => {
                const list = document.getElementById('list-container');
                list.innerHTML = "";
                s.forEach(doc => {
                    const a = doc.data();
                    const d = document.createElement('div');
                    d.className = "ath-item"; d.innerText = a.name;
                    d.onclick = () => loadStats(a);
                    list.appendChild(d);
                });
            });
        }

        function loadStats(a) {
            document.getElementById('stats-panel').style.display = 'block';
            document.getElementById('active-name').innerText = a.name;
            // On récupère TOUTES les sessions de cet athlète
            db.collection('sessions').where('athleteId', '==', a.uid).onSnapshot(s => {
                let data = [];
                s.forEach(doc => data.push(doc.data()));
                
                // Tri manuel par date (du plus ancien au plus récent pour le graph)
                data.sort((x, y) => x.date.seconds - y.date.seconds);

                const labels = [], values = [];
                const hBox = document.getElementById('history-box');
                hBox.innerHTML = "";
                
                data.forEach(item => {
                    const dStr = item.date.toDate().toLocaleDateString();
                    labels.push(dStr);
                    values.push(parseFloat(item.time));
                    // Pour la liste, on met le plus récent en haut
                    hBox.insertAdjacentHTML('afterbegin', `<div class="card"><b>${item.time}s</b> <span>${dStr}</span></div>`);
                });
                renderChart(labels, values);
            });
        }

        function renderChart(l, v) {
            const ctx = document.getElementById('perfChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: l, datasets: [{ label: 'Temps (s)', data: v, borderColor: '#ff4757', backgroundColor: 'rgba(255, 71, 87, 0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { reverse: true } } }
            });
        }
    </script>
</body>
</html>
